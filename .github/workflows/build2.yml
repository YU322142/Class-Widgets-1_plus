name: 构建

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      build_type:
        description: "构建类型"
        required: true
        default: "Debug"
        type: choice
        options:
          - "Release"
          - "Nightly"
          - "Debug"
      release_version:
        description: "发布版本号(仅发布版本有效)"
        required: false
        type: string
      is_signing:
        description: "是否签名"
        required: false
        default: false
        type: boolean
      win32_x64:
        description: "win32-x64"
        required: false
        type: boolean
        default: true
      win32_x86:
        description: "win32-x86"
        required: false
        type: boolean
        default: true
      # win32_arm64:
      #   description: "win32-arm64"
      #   required: false
      #   type: boolean
      #   default: false
      # macos_x64:
      #   description: "macos-x64"
      #   required: false
      #   type: boolean
      #   default: true
      macos_arm64:
        description: "macos-arm64"
        required: false
        type: boolean
        default: true
      linux_x64:
        description: "linux-x64"
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      build_type:
        description: "构建类型 (Release/Nightly/Debug)"
        required: false
        default: "Debug"
        type: string
      release_version:
        description: "发布版本号(仅发布版本有效)"
        required: false
        type: string
      is_signing:
        description: "是否签名"
        required: false
        default: false
        type: boolean
      win32_x64:
        description: "win32-x64"
        required: false
        type: boolean
        default: true
      win32_x86:
        description: "win32-x86"
        required: false
        type: boolean
        default: true
      # win32_arm64:
      #   description: "win32-arm64"
      #   required: false
      #   type: boolean
      #   default: false
      # macos_x64:
      #   description: "macos-x64"
      #   required: false
      #   type: boolean
      #   default: true
      macos_arm64:
        description: "macos-arm64"
        required: false
        type: boolean
        default: true
      linux_x64:
        description: "linux-x64"
        required: false
        type: boolean
        default: true
    outputs:
      run_id:
        description: "构建运行ID"
        value: ${{ jobs.prepare.outputs.build_runid }}
      package_count:
        description: "打包文件数量"
        value: ${{ jobs.package.outputs.package-count }}
      package_result:
        description: "打包作业结果"
        value: ${{ jobs.package.result }}
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
      - "Scripts/**"
      - ".gitignore"
      - ".gitattributes"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/DISCUSSION_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE*"

concurrency:
  group: build-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write
  pull-requests: read

jobs:
  prepare:
    name: Update Info
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.build-info.outputs.build_type }}
      build_time: ${{ steps.build-info.outputs.build_time }}
      build_commit: ${{ steps.build-info.outputs.build_commit }}
      build_branch: ${{ steps.build-info.outputs.build_branch }}
      build_runid: ${{ steps.build-info.outputs.build_runid }}
      release_version: ${{ steps.build-info.outputs.release_version }}
      skip_ci: ${{ steps.check-skip-ci.outputs.skip_ci }}
      platforms: ${{ steps.build-info.outputs.platforms }}
      platforms_array: ${{ steps.build-info.outputs.platforms_array }}
      matrix: ${{ steps.build-info.outputs.matrix }}
      is_signing: ${{ steps.build-info.outputs.is_signing }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check Skip CI
        id: check-skip-ci
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
        run: |
          skip_ci=false
          commit_sha=""
          commit_message=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "$PR_TITLE" =~ [Ss][Kk][Ii][Pp][[:space:]][Cc][Ii] ]]; then
              skip_ci=true
            fi
            if [[ "${{ github.event.action }}" == "synchronize" && "$skip_ci" == "false" ]]; then
              commit_sha="${{ github.event.pull_request.head.sha }}"
              commit_message=$(git log -1 --pretty=%B "$commit_sha")
              if echo "$commit_message" | grep -i -q "skip[[:space:]]*ci"; then
                skip_ci=true
              fi
            fi
          fi
          echo "skip_ci=$skip_ci" >> $GITHUB_OUTPUT
          echo "::group::Commit Message"
          echo "[DEBUG] commit-message: \"$commit_message\" ; sha: $commit_sha ; skip-ci: $skip_ci"
          echo "::endgroup::"
          echo "是否跳过 CI: $skip_ci" >> $GITHUB_STEP_SUMMARY

      - name: Set Build Info
        id: build-info
        if: steps.check-skip-ci.outputs.skip_ci != 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          PR_BRANCH: ${{ github.event.pull_request.head.repo.owner.login || github.repository_owner }}:${{ github.event.pull_request.head.ref || github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          build_time=$(date -u -d "+8 hours" +"%Y-%m-%d %H:%M")
          build_commit="${GITHUB_SHA:0:7}"
          build_branch="${GITHUB_REF_NAME}"
          build_runid="${GITHUB_RUN_ID}"

          # determine build_type
          if [[ -n "${{ inputs.build_type }}" ]]; then
            build_type="${{ inputs.build_type }}"
            echo "[DEBUG] 使用 inputs.build_type: $build_type"
          elif [[ -n "${{ github.event.inputs.build_type }}" ]]; then
            build_type="${{ github.event.inputs.build_type }}"
            echo "[DEBUG] 使用 event.inputs.build_type: $build_type"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            build_type="Release"
            echo "[DEBUG] Release 标签推送: $build_type"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            build_branch="$PR_BRANCH"
            build_type="Debug (PR-#${PR_NUMBER})"
            echo "[DEBUG] PR 构建: $build_type"
          else
            build_type="Debug"
            echo "[DEBUG] 默认构建类型: $build_type"
          fi

          # release version
          release_version="${{ inputs.release_version || github.event.inputs.release_version || '' }}"
          if [[ -z "$release_version" && "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          fi

          # is_signing flag
          is_signing="${{ inputs.is_signing || github.event.inputs.is_signing || false }}"

          # 构建平台数组
          declare -A ALL_PLATFORMS=(
            ["win32-x64"]="${{ inputs.win32_x64 || github.event.inputs.win32_x64 || '' }}"
            ["win32-x86"]="${{ inputs.win32_x86 || github.event.inputs.win32_x86 || '' }}"
            ["macos-arm64"]="${{ inputs.macos_arm64 || github.event.inputs.macos_arm64 || '' }}"
            ["linux-x64"]="${{ inputs.linux_x64 || github.event.inputs.linux_x64 || '' }}"
          )

          declare -a SELECTED_PLATFORMS=()
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "[DEBUG] PR 事件平台: win32-x64, linux-x64, macos-arm64"
            SELECTED_PLATFORMS+=("win32-x64" "linux-x64" "macos-arm64")
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "[DEBUG] push 事件平台: all"
            SELECTED_PLATFORMS+=("win32-x64" "win32-x86" "linux-x64" "macos-arm64")
          fi

          for platform in "${!ALL_PLATFORMS[@]}"; do
            input_val="${ALL_PLATFORMS[$platform]}"
            if [[ "$input_val" == "true" || ( -z "$input_val" && "$GITHUB_EVENT_NAME" != "pull_request" ) ]]; then
              SELECTED_PLATFORMS+=("$platform")
            fi
          done

          # 去重
          declare -A UNIQUE_PLATFORMS
          platforms=""
          for platform in "${SELECTED_PLATFORMS[@]}"; do
            if [[ -z "${UNIQUE_PLATFORMS[$platform]}" ]]; then
              UNIQUE_PLATFORMS[$platform]=1
              platforms="${platforms}${platform},"
            fi
          done
          platforms=${platforms%,}
          echo "[DEBUG] 最终平台列表: $platforms"

          # emit outputs
          echo "release_version=$release_version" >> $GITHUB_OUTPUT
          echo "is_signing=$is_signing" >> $GITHUB_OUTPUT
          echo "build_type=$build_type" >> $GITHUB_OUTPUT
          echo "build_time=$build_time" >> $GITHUB_OUTPUT
          echo "build_commit=$build_commit" >> $GITHUB_OUTPUT
          echo "build_branch=$build_branch" >> $GITHUB_OUTPUT
          echo "build_runid=$build_runid" >> $GITHUB_OUTPUT
          echo "platforms=$platforms" >> $GITHUB_OUTPUT

          # 平台数组矩阵
          declare -A PLATFORM_MAPPING=(
            ["win32-x64"]="{\"os\":\"windows-latest\",\"arch\":\"x64\",\"platform\":\"windows-x64\",\"platform_id\":\"win32-x64\"}"
            ["win32-x86"]="{\"os\":\"windows-latest\",\"arch\":\"x86\",\"platform\":\"windows-x86\",\"platform_id\":\"win32-x86\"}"
            ["macos-arm64"]="{\"os\":\"macos-latest\",\"arch\":\"arm64\",\"platform\":\"macos-arm64\",\"platform_id\":\"macos-arm64\"}"
            ["linux-x64"]="{\"container\":\"debian:10-slim\",\"arch\":\"x64\",\"platform\":\"linux-x64\",\"platform_id\":\"linux-x64\"}"
          )

          platforms_array="[]"
          if [[ -n "$platforms" ]]; then
            IFS=',' read -ra PLATFORM_LIST <<< "$platforms"
            platforms_array="["
            for platform in "${PLATFORM_LIST[@]}"; do
              platforms_array="$platforms_array\"$platform\","
            done
            platforms_array=${platforms_array%,}
            platforms_array="$platforms_array]"
          fi
          echo "platforms_array=$platforms_array" >> $GITHUB_OUTPUT

          # 矩阵json
          matrix_json="{\"include\":[]}"
          if [[ -n "$platforms" ]]; then
            matrix_json="{\"include\":["
            for platform in "${PLATFORM_LIST[@]}"; do
              if [[ -n "${PLATFORM_MAPPING[$platform]}" ]]; then
                matrix_json="$matrix_json${PLATFORM_MAPPING[$platform]},"
              fi
            done
            matrix_json=${matrix_json%,}
            matrix_json="$matrix_json]}"
          fi
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

          {
            echo "## 📋 构建信息"
            echo "| 项目 | 值 |"
            echo "|------|----|"
            echo "| ⏰ 构建时间 (UTC+8) | $build_time |"
            echo "| 🔗 提交哈希 | $build_commit |"
            echo "| 🌿 分支 | $build_branch |"
            echo "| 🆔 运行 ID | $build_runid |"
            echo "| 🧪 构建类型 | $build_type |"
            echo "| 🖥️ 构建平台 | $platforms |"
            echo "| 🔐 是否签名 | $is_signing |"
            echo "| 🏷️ 发布版本 | ${release_version:-未指定} |"
          } >> $GITHUB_STEP_SUMMARY

  build:
    needs: [prepare]
    if: needs.prepare.result == 'success' && needs.prepare.outputs.skip_ci != 'true'
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    container: ${{ matrix.container || null }}
    timeout-minutes: 45
    strategy:
      fail-fast: true
      max-parallel: 4
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    env:
      PYTHON_VERSION: "3.10.7"
      UV_PROJECT_ENVIRONMENT: .venv
      BUILD_TYPE: ${{ needs.prepare.outputs.build_type }}
      BUILD_TIME: ${{ needs.prepare.outputs.build_time }}
      BUILD_COMMIT: ${{ needs.prepare.outputs.build_commit }}
      BUILD_BRANCH: ${{ needs.prepare.outputs.build_branch }}
      BUILD_RUNID: ${{ needs.prepare.outputs.build_runid }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
      IS_SIGNING: ${{ needs.prepare.outputs.is_signing }}
    steps:
      - name: Cache dependencies (Linux)
        if: matrix.platform == 'linux-x64'
        uses: actions/cache@v5
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-archives

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          sed -i 's|deb.debian.org|archive.debian.org|g' /etc/apt/sources.list
          sed -i 's|security.debian.org|archive.debian.org/debian-security|g' /etc/apt/sources.list
          apt -o Acquire::Check-Valid-Until=false update
          apt-get update -qq && apt-get upgrade -y
          apt-get install -y --no-install-recommends \
            git curl ca-certificates zip \
            build-essential pkg-config python3-dev libfontconfig1 libxrender1 \
            libffi-dev libglib2.0-dev libx11-dev libxcb1-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-0 libxcb-shm0-dev libxcb-render0-dev \
            libgl1-mesa-dev mesa-utils libgl1-mesa-glx libgl1-mesa-dri
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install gettext (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          if ! brew list gettext &>/dev/null; then
            brew install gettext
            brew link --overwrite --force gettext || true
          fi

      - name: Cache Python (Linux/macOS, uv managed)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/share/uv/python
          key: ${{ runner.os }}-${{ matrix.arch }}-python${{ env.PYTHON_VERSION }}

      - name: Setup Python 3.10.7 (Windows, true x86/x64)
        if: startsWith(matrix.os, 'windows')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.arch }}

      - name: Setup Python 3.10.7 + uv (Linux/macOS)
        if: ${{ !startsWith(matrix.os, 'windows') }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          activate-environment: true
          enable-cache: true
          prune-cache: false

      - name: Setup uv (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          prune-cache: false

      - name: Create project virtual environment (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          python --version
          python -m venv .venv

      - name: Verify Python runtime
        shell: bash
        run: |
          python - <<'PY'
          import platform, struct, sys
          print("sys.executable =", sys.executable)
          print("sys.version    =", sys.version.replace("\n", " "))
          print("platform       =", platform.platform())
          print("machine        =", platform.machine())
          print("pointer_bits   =", struct.calcsize("P") * 8)
          PY

      - name: Python Syntax Check
        id: syntax_check
        shell: bash
        continue-on-error: false
        run: |
          python_files=$(find . -name "*.py" -not -path "*/__pycache__/*" -not -path "*/.venv/*" -not -path "*/build/*" -not -path "*/dist/*" | sort)
          total_files=$(echo "$python_files" | wc -l)
          echo "[DEBUG] 发现$total_files个文件"
          has_errors=false
          error_count=0
          error_report="## 🔍 Python 语法检查  \n\n"
          error_report+="**检查时间**: $(date '+%Y-%m-%d %H:%M:%S')  \n"
          error_report+="**Python版本**: $(python --version)  \n"
          error_report+="**操作系统**: ${{ matrix.os }} - ${{ matrix.arch }}  \n"
          error_report+="**检查文件数**: $total_files  \n\n"
          error_report+="---  \n\n"
          for file in $python_files; do
            echo "检查文件: $file"
            if ! python -m py_compile "$file" 2>/dev/null; then
              error_output=$(python -m py_compile "$file" 2>&1 || true)
              echo "::group::Commit Message"
              echo "[DEBUG] ❌ 语法错误: $file"
              echo "[DEBUG] 错误详情: $error_output"
              echo "::endgroup::"
              has_errors=true
              error_count=$((error_count + 1))
              rel_path=$(realpath --relative-to="." "$file")
              error_report+="### 问题 #$error_count: \`$rel_path\`  \n\n"
              error_report+="> [!CAUTION]  \n"
              error_report+="> **错误信息**:  \n"
              error_report+="> \`\`\`  \n"
              formatted_error=$(echo "$error_output" | sed 's/^/> /')
              error_report+="> $formatted_error  \n"
              error_report+="> \`\`\`  \n\n"
              error_report+="---  \n\n"
            fi
          done
          if [ "$has_errors" = true ]; then
            echo "has_syntax_errors=true" >> $GITHUB_OUTPUT
            echo "error_count=$error_count" >> $GITHUB_OUTPUT
            error_report+="### ❌ 发现 **$error_count** 个语法错误"
            echo "$error_report" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "has_syntax_errors=false" >> $GITHUB_OUTPUT
            echo "error_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Update config
        shell: bash
        run: |
          config_path="data/default_config.json"
          config_text=$(cat "$config_path")
          config_text="${config_text//__BUILD_TIME__/$BUILD_TIME}"
          config_text="${config_text//__BUILD_COMMIT__/$BUILD_COMMIT}"
          config_text="${config_text//__BUILD_BRANCH__/$BUILD_BRANCH}"
          config_text="${config_text//__BUILD_RUNID__/$BUILD_RUNID}"
          config_text="${config_text//__BUILD_TYPE__/$BUILD_TYPE}"
          if [[ "$BUILD_TYPE" == "Release" || "$BUILD_TYPE" == "Nightly" ]]; then
            VERSION="${RELEASE_VERSION}"
            config_text="${config_text//__BUILD_VERSION__/$VERSION}"
          fi
          if [[ "$BUILD_TYPE" == "Release" ]]; then
            config_text="${config_text//__BUILD_CHANNEL__/0}"
          else
            config_text="${config_text//__BUILD_CHANNEL__/1}"
          fi
          printf "%s" "$config_text" > "$config_path"

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~\AppData\Local\uv
          key: ${{ runner.os }}-${{ matrix.arch }}-python${{ env.PYTHON_VERSION }}-uv-cache-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-python${{ env.PYTHON_VERSION }}-uv-cache-

      - name: Install dependencies
        shell: bash
        run: |
          uv sync --group package --no-dev
          uv pip list --outdated || true

      - name: Prepare output directory
        run: |
          mkdir -p packages

      - name: Set environment variables
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
        run: |
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV

      - name: Cleanup .ts
        shell: bash
        run: |
          find ui -name "*.ts" -delete || true
          find view -name "*.ts" -delete || true

      - name: Build Windows (pyinstaller)
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          uv run --no-dev pyinstaller main.py \
            -w \
            -i ./img/favicon.ico \
            -n "ClassWidgets" \
            --contents-directory . \
            --add-data "data:data" \
            --add-data "audio:audio" \
            --add-data "img:img" \
            --add-data "ui:ui" \
            --add-data "font:font" \
            --add-data "view:view" \
            --add-data "i18n/*.qm:i18n" \
            --add-data "LICENSE:." \
            --hidden-import darkdetect \
            --strip \
            --optimize 2

          # 复制 SSL 相关二进制（兼容 x64 / x86 / 不同 OpenSSL 命名）
          DLLDIR="$(python -c 'import sys, os; print(os.path.join(sys.base_prefix, "DLLs"))')"
          echo "[DEBUG] Copying SSL binaries from $DLLDIR"
          cp -af "$DLLDIR/_ssl.pyd" "dist/ClassWidgets/" || true
          for pattern in libcrypto-3*.dll libssl-3*.dll libcrypto-1_1*.dll libssl-1_1*.dll; do
            for f in "$DLLDIR"/$pattern; do
              if [[ -f "$f" ]]; then
                cp -af "$f" "dist/ClassWidgets/" || true
              fi
            done
          done

          if [[ "$BUILD_TYPE" == "Release" ]]; then
            zip_name="ClassWidgets-Windows-${{ matrix.arch }}"
          else
            zip_name="Windows-${{ matrix.arch }}_debug-${GITHUB_RUN_ID}"
          fi

          mv dist/ClassWidgets "dist/${zip_name}"
          powershell.exe -NoProfile -Command "Compress-Archive -Path 'dist/${zip_name}\*' -DestinationPath 'packages/${zip_name}.zip' -Force"

      - name: Build macOS (pyinstaller)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          export MACOSX_DEPLOYMENT_TARGET=11.0
          uv run --no-dev pyinstaller main.py \
            -w \
            -i ./img/favicon.icns \
            -n "Class Widgets" \
            --contents-directory . \
            --add-data "data:data" \
            --add-data "audio:audio" \
            --add-data "img:img" \
            --add-data "ui:ui" \
            --add-data "font:font" \
            --add-data "view:view" \
            --add-data "i18n/*.qm:i18n" \
            --add-data "LICENSE:." \
            --hidden-import darkdetect \
            --strip \
            --optimize 2

          cp -R dist/"Class Widgets.app" .
          if [[ "$BUILD_TYPE" == "Release" ]]; then
            zip_name="ClassWidgets-macOS-${{ matrix.arch }}"
          else
            zip_name="macOS(${{ matrix.arch }})_debug-${GITHUB_RUN_ID}"
          fi
          zip -r -q "packages/${zip_name}.zip" "Class Widgets.app"

      - name: Build Linux (pyinstaller)
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          uv run --no-dev pyinstaller main.py \
            -w \
            -i ./img/favicon.png \
            -n "ClassWidgets" \
            --contents-directory . \
            --add-data "data:data" \
            --add-data "audio:audio" \
            --add-data "img:img" \
            --add-data "ui:ui" \
            --add-data "font:font" \
            --add-data "view:view" \
            --add-data "i18n/*.qm:i18n" \
            --add-data "LICENSE:." \
            --hidden-import darkdetect \
            --strip \
            --optimize 2

          if [[ "$BUILD_TYPE" == "Release" ]]; then
            zip_name="ClassWidgets-Linux-x64"
            rm deb/opt/apps/cn.rinlit.classwidgets/files/.gitkeep
            cp dist/ClassWidgets/* deb/opt/apps/cn.rinlit.classwidgets/files/ -rvp
          else
            zip_name="Linux-x64_debug-${GITHUB_RUN_ID}"
          fi
          cd dist && mv ClassWidgets "${zip_name}" && zip -r -q "../packages/${zip_name}.zip" "${zip_name}"/* && cd ..

      - name: Build .deb Package (Linux)
        if: matrix.platform == 'linux-x64' && env.BUILD_TYPE == 'Release'
        run: |
          control_file="deb/DEBIAN/control"

          # 计算 Installed-Size
          installed_size=$(du -sk deb/opt deb/usr 2>/dev/null | awk '{s+=$1} END{print s}')

          # 填入 control 文件
          sed -i "s/^Version:.*/Version: $RELEASE_VERSION/" "$control_file"
          sed -i "s/^Installed-Size:.*/Installed-Size: ${installed_size}/" "$control_file"

          # 更改 info 版本号
          sed -i "s/\"version\": \".*\"/\"version\": \"$RELEASE_VERSION\"/" deb/opt/apps/cn.rinlit.classwidgets/info

          dpkg-deb -b deb packages/cn.rinlit.classwidgets_${RELEASE_VERSION}_amd64.deb

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform }}-build
          path: ./packages

      - name: Prepare file for signing (Windows)
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path ./packages -Filter "*.zip" | Select-Object -First 1
          if ($null -eq $zip) { Write-Error "未找到构建 ZIP"; exit 1 }
          New-Item -ItemType Directory -Path ./sign-work -Force | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath ./sign-work -Force
          $top = Get-ChildItem -Path ./sign-work | Where-Object {$_.PSIsContainer} | Select-Object -First 1
          if ($null -eq $top) { Write-Error "ZIP 内容异常"; exit 1 }
          New-Item -ItemType Directory -Path ./exe-for-signing -Force | Out-Null
          $exe = Get-ChildItem -Path $top.FullName -Filter "ClassWidgets.exe" -Recurse | Select-Object -First 1
          if ($null -eq $exe) { Write-Error "未找到待签名的 ClassWidgets.exe"; exit 1 }
          Copy-Item $exe.FullName -Destination "./exe-for-signing/ClassWidgets.exe" -Force

      - name: Upload unsigned artifact (Windows)
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        id: upload_unsigned
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.arch }}-exe-unsigned
          path: ./exe-for-signing

      - name: Submit signing request (Windows)
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        id: submit_sign
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 2e13633d-4e7d-4462-9091-27536751c84c
          project-slug: Class-Widgets.git
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./signed-output

      - name: Extract original build ZIP to dist (Windows)
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        shell: pwsh
        run: |
          $zip = Get-ChildItem -Path ./packages -Filter "*.zip" | Select-Object -First 1
          if ($null -eq $zip) { Write-Error "未找到构建 ZIP"; exit 1 }
          New-Item -ItemType Directory -Path ./workdir -Force | Out-Null
          Expand-Archive -Path $zip.FullName -DestinationPath ./workdir -Force
          $top = Get-ChildItem -Path ./workdir | Where-Object {$_.PSIsContainer} | Select-Object -First 1
          if ($null -eq $top) { Write-Error "ZIP 内容异常"; exit 1 }
          New-Item -ItemType Directory -Path ./dist/ClassWidgets -Force | Out-Null
          Copy-Item -Path (Join-Path $top.FullName '*') -Destination ./dist/ClassWidgets -Recurse -Force

      - name: Replace executable with signed version
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        shell: pwsh
        run: |
          if (Test-Path "./signed-output/ClassWidgets.exe") {
            New-Item -ItemType Directory -Path ./dist/ClassWidgets -Force | Out-Null
            Copy-Item "./signed-output/ClassWidgets.exe" "dist/ClassWidgets/ClassWidgets.exe" -Force
          } else { Write-Error "未找到已签名的可执行文件"; exit 1 }

      - name: Create signed build package (Windows)
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ClassWidgets/*" -DestinationPath "packages/ClassWidgets-Windows-${{ matrix.arch }}-signed.zip" -Force

      - name: Upload signed build package (Windows)
        if: startsWith(matrix.os, 'windows') && env.IS_SIGNING == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.arch }}-build-signed
          path: packages/ClassWidgets-Windows-${{ matrix.arch }}-signed.zip

  package:
    needs: [prepare, build]
    if: always() && (needs.build.result == 'success') && (needs.prepare.outputs.build_type == 'Release' || needs.prepare.outputs.build_type == 'Nightly') && needs.prepare.outputs.skip_ci != 'true'
    runs-on: ubuntu-latest
    outputs:
      package-count: ${{ steps.organize.outputs.package-count }}
      build_type: ${{ needs.prepare.outputs.build_type }}
      run_id: ${{ github.run_id }}
    env:
      BUILD_TYPE: ${{ needs.prepare.outputs.build_type }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./all-artifacts

      - name: Organize and upload packages
        id: organize
        shell: bash
        run: |
          mkdir -p final-packages || { rm -rf final-packages; mkdir final-packages; }
          package_count=0
          run_id="${{ github.run_id }}"
          declare -A platforms=(
            ["windows-x64"]="windows"
            ["windows-x86"]="windows"
            ["macos-arm64"]="macos"
            ["linux-x64"]="linux"
          )

          declare -A artifact_cache
          for artifact_dir in ./all-artifacts/*/; do
            if [[ -d "$artifact_dir" ]]; then
              dir_name=$(basename "$artifact_dir")
              artifact_cache["$dir_name"]="$artifact_dir"
            fi
          done

          process_file() {
            local source_file=$1
            local target_name=$2
            local platform=$3
            local file_type=$4

            if [[ -f "$source_file" ]]; then
              cp -f "$source_file" "final-packages/$target_name"
              package_count=$(($package_count + 1))
              file_size=$(stat -c%s "$source_file" 2>/dev/null || echo "未知")
              file_md5=$(md5sum "$source_file" 2>/dev/null | cut -d' ' -f1 || echo "未知")
              if [[ "$file_size" != "未知" ]]; then
                file_size_mb=$(echo "scale=2; $file_size / 1024 / 1024" | bc 2>/dev/null || echo "未知")
              else
                file_size_mb="未知"
              fi
              echo "[DEBUG] ($platform - $file_type): $target_name, $file_size_mb MB, $file_size bytes, $file_md5"
            else
              echo "[DEBUG] 文件不存在: $source_file"
            fi
          }

          for platform in "${!platforms[@]}"; do
            platform_type="${platforms[$platform]}"

            if [[ "$platform_type" == "windows" ]]; then
              # Windows 平台：优先使用签名版本
              build_signed_key="${platform}-build-signed"
              build_key="${platform}-build"

              # 处理 ZIP 包（优先签名版本）
              if [[ -n "${artifact_cache[$build_signed_key]:-}" ]]; then
                echo "[DEBUG] 使用 ${platform} 签名版本 ZIP"
                for zip_file in "${artifact_cache[$build_signed_key]}"/*.zip; do
                  if [[ -f "$zip_file" ]]; then
                    target_name="ClassWidgets-Windows-${platform#windows-}_${run_id}.zip"
                    process_file "$zip_file" "$target_name" "$platform" "已签名ZIP"
                    break
                  fi
                done
              elif [[ -n "${artifact_cache[$build_key]:-}" ]]; then
                echo "[DEBUG] 使用 ${platform} 构建版本 ZIP"
                for zip_file in "${artifact_cache[$build_key]}"/*.zip; do
                  if [[ -f "$zip_file" ]]; then
                    target_name="ClassWidgets-Windows-${platform#windows-}_${run_id}.zip"
                    process_file "$zip_file" "$target_name" "$platform" "构建ZIP"
                    break
                  fi
                done
              fi
            else
              # 非 Windows 平台：使用构建版本
              build_key="${platform}-build"
              if [[ -n "${artifact_cache[$build_key]:-}" ]]; then
                echo "[DEBUG] 使用 ${platform} 构建版本"

                # 处理 ZIP 包
                for zip_file in "${artifact_cache[$build_key]}"/*.zip; do
                  if [[ -f "$zip_file" ]]; then
                    case "$platform_type" in
                      "macos")
                        target_name="ClassWidgets-Macos-${platform#macos-}_${run_id}.zip"
                        ;;
                      "linux")
                        target_name="ClassWidgets-Linux-${platform#linux-}_${run_id}.zip"
                        ;;
                    esac
                    process_file "$zip_file" "$target_name" "$platform" "构建ZIP"
                    break
                  fi
                done

                # 处理 .deb 包（仅 Linux）
                if [[ "$platform_type" == "linux" ]]; then
                  for deb_file in "${artifact_cache[$build_key]}"/*.deb; do
                    if [[ -f "$deb_file" ]]; then
                      target_name="ClassWidgets-Linux-${platform#linux-}_${run_id}.deb"
                      process_file "$deb_file" "$target_name" "$platform" "构建DEB"
                      break
                    fi
                  done
                fi
              else
                echo "[DEBUG] ${platform} 版本未找到"
              fi
            fi
          done

          echo "package-count=$package_count" >> $GITHUB_OUTPUT
          if [[ $package_count -eq 0 ]]; then
            echo "[DEBUG] 没有找到任何包文件"
          fi

      - name: Generate package provenance
        if: env.BUILD_TYPE == 'Release'
        uses: actions/attest-build-provenance@v3
        id: generate-provenance
        with:
          subject-path: "final-packages/*"

      - name: Calculate package properties
        shell: bash
        run: |
          {
            echo "构建时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "构建ID: ${{ github.run_id }}"
            echo "提交: ${{ github.sha }}"
            echo ""
            echo "---"
            echo ""
            echo "## 包信息 (${{ steps.organize.outputs.package-count }}个文件)"
            echo ""
            echo '<div style="overflow-x: auto; white-space: nowrap;">'
            echo ""
            echo "| 文件名 | 大小(MB) | MD5 |"
            echo "|--------|----------|-----|"
          } > final-packages/file-info.md

          shopt -s nullglob
          files=(final-packages/*.zip final-packages/*.deb)
          if [ ${#files[@]} -eq 0 ]; then
            echo "未找到任何包文件" >> final-packages/file-info.md
          else
            for package_file in "${files[@]}"; do
              if [[ -f "$package_file" ]]; then
                filename=$(basename "$package_file")
                file_size=$(stat -c%s "$package_file" 2>/dev/null || wc -c < "$package_file" 2>/dev/null || echo "未知")
                file_md5=$(md5sum "$package_file" 2>/dev/null | cut -d' ' -f1 || echo "未知")
                file_size_mb=$(awk "BEGIN {printf \"%.2f\", $file_size / 1024 / 1024}" 2>/dev/null || echo "未知")
                echo "| $filename | $file_size_mb | \`$file_md5\` |" >> final-packages/file-info.md
              fi
            done
          fi

          echo "" >> final-packages/file-info.md
          echo "</div>" >> final-packages/file-info.md
          echo "" >> final-packages/file-info.md
          cat final-packages/file-info.md >> $GITHUB_STEP_SUMMARY

          BUNDLE_PATH="${{ steps.generate-provenance.outputs.bundle-path }}"
          if [ -n "$BUNDLE_PATH" ] && [ -f "$BUNDLE_PATH" ]; then
            cp -af "$BUNDLE_PATH" final-packages/file_provenance.json
            echo "[DEBUG] 已生成并收集证明文件: $BUNDLE_PATH"
          fi

          echo "[DEBUG] 最终包列表:"
          ls -la final-packages/ || true

      - name: Upload final packages
        uses: actions/upload-artifact@v6
        with:
          name: ClassWidgets-Packages
          path: final-packages

      - name: Upload provenance artifacts
        if: ${{ env.BUILD_TYPE == 'Release' && steps.generate-provenance.outputs.bundle-path != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: provenance
          path: |
            provenance/*
            ${{ steps.generate-provenance.outputs.bundle-path }}
